version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: edupub-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=edupub_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edupub-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edupub-backend
    restart: always
    ports:
      - "3001:3001"
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/src/main.js"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/edupub_manager?schema=public
      - JWT_SECRET=super_secret_jwt_key_change_me_in_production
      - JWT_EXPIRES_IN=1d
      - BCRYPT_SALT_ROUNDS=10
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - edupub-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
    container_name: edupub-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    networks:
      - edupub-network

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  edupub-network:
    driver: bridge
