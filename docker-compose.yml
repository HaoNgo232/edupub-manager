version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: edupub-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=edupub_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edupub-network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  edupub-network:
    driver: bridge
